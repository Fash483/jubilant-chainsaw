name: Extract Zip for Vercel Deployment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip to Temporary Directory
        run: |
          unzip -o magnet-vault-updated.zip -d temp-extraction

      - name: Move Files to Root and Cleanup
        run: |
          # Move everything from the nested zip folder directly into the root repository
          cp -r temp-extraction/magnet-vault/* ./
          
          # Delete the temporary extraction folder and the original zip file
          rm -rf temp-extraction
          rm magnet-vault-updated.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10 # Matches the version Vercel is detecting

      - name: Update Lockfile
        run: |
          # Force pnpm to reconcile the lockfile with the updated package.json
          pnpm install --no-frozen-lockfile

      - name: Commit and Push to Root
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy: Extract files, sync pnpm-lock.yaml, and remove zip" || exit 0
          git push
