name: Extract Zip File

on:
  workflow_dispatch:

permissions:
  contents: write # Grants the bot permission to push changes to the repository

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip File
        run: |
          unzip -o magnet-vault-updated.zip -d extracted-vault

      - name: Commit and Push Extracted Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extracted-vault/
          git commit -m "Automated unzip of magnet-vault-updated.zip" || exit 0
          git push
